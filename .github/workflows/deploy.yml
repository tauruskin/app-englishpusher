name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: echo "VITE_BASE_PATH=/" >> $GITHUB_ENV

      - run: npm run build

      - name: Build word-connections
        run: |
          cd word-connections
          npm install
          npm run build
          cp -r dist ../dist/word-connections

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          cname: app.englishpusher.in.ua
